name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true
  # Public-API snapshot regen (tests/public_api_doc.rs) needs nightly
  # rustdoc + cargo-public-api; only the clippy job carries them and runs the
  # =check gate. Everywhere else the test skips.
  ZEN_API_DOC: off

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: Linux aarch64
            os: ubuntu-24.04-arm
          - name: macOS arm64
            os: macos-latest
          - name: macOS x64
            os: macos-26-intel
          - name: Windows x64
            os: windows-latest
          - name: Windows arm64
            os: windows-11-arm
            # MSVC cl.exe cannot compile .S (GAS syntax) assembly files,
            # so disable the asm feature on Windows ARM64.
            cargo_flags: --no-default-features --features threading
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install nasm (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y nasm
      - name: Install nasm (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm
      - name: Install nasm (Windows x64)
        if: runner.os == 'Windows' && matrix.name != 'Windows arm64'
        run: choco install nasm -y
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace ${{ matrix.cargo_flags }}

  i686:
    name: Test (Linux i686)
    runs-on: ubuntu-latest
    env:
      # cross containers don't inherit host env; without this the
      # public_api_doc test would try to regen inside the container.
      CROSS_CONTAINER_OPTS: "--env ZEN_API_DOC=off"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - run: sudo apt-get install -y nasm
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686
      - name: Run tests (i686)
        run: cross test --target i686-unknown-linux-gnu --workspace

  features:
    name: Feature permutations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      - name: Test threading + serialize
        run: cargo test --workspace --no-default-features --features "threading,serialize"
      - name: Check threading + channel-api
        run: cargo check --no-default-features --features "threading,channel-api"
      - name: Check threading + stop
        run: cargo check --no-default-features --features "threading,stop"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get install -y nasm
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings
      - uses: dtolnay/rust-toolchain@nightly # rustdoc JSON for cargo-public-api
      - uses: dtolnay/rust-toolchain@stable # restore stable as default
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Public-API snapshots are current
        run: cargo test -p zenrav1e --test public_api_doc
        env:
          ZEN_API_DOC: check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y nasm
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo hack check --rust-version --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y nasm
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
