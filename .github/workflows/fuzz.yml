name: Fuzz

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Seconds per fuzz target'
        required: false
        default: '300'

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - construct_context
          - encode_decode_hbd
          - encode_decode
          - encode
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly

      # Native deps for transitive sys crates:
      #   * `nasm` — av-scenechange (and libdav1d-sys "asm" feature) need
      #     it to assemble x86 SIMD kernels.
      #   * `meson` + `ninja-build` — libdav1d-sys configures dav1d's
      #     C build via meson and drives it with ninja. Without them
      #     the libdav1d-sys build.rs panics with "this crate requires
      #     meson (and ninja) to be installed".
      # Placed BEFORE the rust-cache step so cargo-cache lookups fire
      # after these are available (the cache key is unaffected).
      - name: Install native build deps (nasm, meson, ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm meson ninja-build

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-${{ matrix.target }}
          cache-directories: fuzz/target

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Determine duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "seconds=300" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "seconds=${{ github.event.inputs.duration || '300' }}" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=60" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed corpus
        run: |
          mkdir -p fuzz/corpus/${{ matrix.target }}
          cp fuzz/regression/* fuzz/corpus/${{ matrix.target }}/ 2>/dev/null || true
          cp fuzz/seed_corpus/${{ matrix.target }}/* fuzz/corpus/${{ matrix.target }}/ 2>/dev/null || true

      - name: Fuzz ${{ matrix.target }}
        run: |
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} \
            -- -max_total_time=${{ steps.duration.outputs.seconds }} \
               -rss_limit_mb=2048

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/
          retention-days: 30

  regression:
    name: Fuzz regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Same native deps as the fuzz job — av-scenechange wants nasm,
      # libdav1d-sys wants meson + ninja (when the crate ends up on
      # the regression-test compile path).
      - name: Install native build deps (nasm, meson, ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm meson ninja-build
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Regression seeds
        run: |
          if [ -d fuzz/regression ] && [ "$(ls fuzz/regression/ 2>/dev/null | wc -l)" -gt 0 ]; then
            # `_fuzz_replay` exposes `pub mod fuzzing` so the harness can replay
            # the committed crash seeds through the real fuzz entry points.
            cargo test --features _fuzz_replay --test fuzz_regression
          fi
